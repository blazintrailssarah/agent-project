synthesize_summary:
  description: |
    Synthesize all crew outputs into a comprehensive final summary markdown document.

    READ ALL AVAILABLE OUTPUTS (check existence first, skip missing):
    1. WorkspaceTool(operation="read", filename="ci_summary.json", content="")
    2. WorkspaceTool(operation="read", filename="quick_review.json", content="")
    3. WorkspaceTool(operation="read", filename="router_decision.json", content="")
    4. WorkspaceTool(operation="read", filename="full_review.json", content="")
    5. WorkspaceTool(operation="read", filename="diff_context.json", content="")

    SPECIALIST CREW OUTPUTS (read each if it exists):
    6.  WorkspaceTool(operation="read", filename="security_review.json", content="")
    7.  WorkspaceTool(operation="read", filename="legal_review.json", content="")
    8.  WorkspaceTool(operation="read", filename="finance_review.json", content="")
    9.  WorkspaceTool(operation="read", filename="documentation_review.json", content="")
    10. WorkspaceTool(operation="read", filename="agentic_consistency_review.json", content="")
    11. WorkspaceTool(operation="read", filename="marketing_review.json", content="")
    12. WorkspaceTool(operation="read", filename="science_review.json", content="")
    13. WorkspaceTool(operation="read", filename="government_regulatory_review.json", content="")
    14. WorkspaceTool(operation="read", filename="strategic_review.json", content="")

    MARKDOWN STYLE RULES (from AGENTS.md / agentic/markdown_style_guide.md):
    You MUST follow these formatting rules in the output markdown:
    - Exactly ONE H1 title at the top of the document
    - H2 headings get exactly ONE emoji at the start: "## 🛡️ Security review"
    - H3 and H4 headings get NO emoji
    - Sentence case for headings: "## 🛡️ Security review" not "## 🛡️ Security Review"
    - Use <details> for collapsible sections; ALWAYS put --- after every </details>
    - Tables: always include a header row, bold the key column, concise cells
    - Use `code formatting` for file paths, commands, config values
    - Bold sparingly — key terms only, never entire sentences
    - Horizontal rule --- after the title metadata block
    - No decorative emoji (🎉💯🔥🎊💥✨) — only meaningful ones from approved set
    - Blank line before and after headings, code blocks, blockquotes, tables

    SYNTHESIZE INTO MARKDOWN:

    HEADER (H1 + metadata):
    # CrewAI Review Summary

    _PR #{pr_number} · {commit_sha} · {repository} · {timestamp}_

    ---

    PRIORITY ACTION ITEMS (always visible, top of document):
    ## 🎯 Priority action items
    Extract the top 5 most severe findings across ALL crews.
    Show as numbered list: severity emoji + title + file + one-line description.

    SEVERITY ROLLUP TABLE (if specialist crews ran):
    ## 📊 Severity rollup

    | Crew | Critical | High | Medium | Low | Info |
    |------|----------|------|--------|-----|------|
    | **Security** | N | N | N | N | N |
    (one row per specialist crew that produced output)
    | **Total** | N | N | N | N | N |

    SECTIONS (include only for crews that ran):

    ## ✅ CI analysis
    Status, summary, critical errors if any.

    ## ⚡ Quick review
    Critical issues (open details), warnings and suggestions (collapsed details).

    ## 🔍 Full technical review
    Top 3-5 high-severity issues if the crew ran.

    For each specialist crew that ran, add a section:
    ## {emoji} {Crew name} review

    Use these emoji per crew:
    - 🛡️ Security | ⚖️ Legal | 💰 Finance | 📚 Documentation
    - 🤖 Agentic | 📢 Marketing | 🔬 Science | 🏛️ Government | 📊 Strategy

    For each specialist section:
    ### Summary
    The crew's summary line from the JSON.

    ### Critical and high findings
    <details open>
    <summary><strong>🔴 Critical and high findings (N)</strong></summary>

    For each finding: **{title}** `{file}`
    {description}
    💡 **Fix**: {recommendation}

    </details>

    ---

    ### Other findings
    <details>
    <summary><strong>Other findings (N medium, N low, N info)</strong></summary>

    Same format but collapsed.

    </details>

    ---

    ## 💡 Router suggestions
    Include autodetect suggestions if present.

    FOOTER:
    ---

    ## 🔗 Traceability
    List all JSON files that were read as a bullet list.

    _Generated by CrewAI Router System · {timestamp}_

    WRITE FINAL OUTPUT:
    WorkspaceTool(operation="write", filename="final_summary.md", content="...markdown...")

    SUCCESS CRITERIA:
    - Follows ALL markdown style rules listed above
    - Exactly one H1, emoji on H2 only, no emoji on H3/H4
    - --- after every </details> block
    - All available JSON files read
    - Final markdown >1000 characters
    - Covers all executed crews
    - Critical issues always visible (<details open>)
    - Severity rollup table if specialist crews ran
    - Priority action items section at the top
    - Actionable recommendations for developer

  expected_output: |
    "Synthesis complete: final_summary.md written with findings from [N] crews"
